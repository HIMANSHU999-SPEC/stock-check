##############################################################################
# Nginx configuration for Stock Management System — AWS Lightsail
#
# Place this file at: /etc/nginx/sites-available/stock-management
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/stock-management /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################################

server {
    listen 80;
    server_name _;          # Replace _ with your domain or Lightsail IP

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/stock-management.access.log;
    error_log  /var/log/nginx/stock-management.error.log warn;

    # ── API: proxy to Node.js on port 3001 ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # ── Static frontend files (React build output) ───────────────────────────
    root /opt/stock-management/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;    # SPA fallback
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Cache static assets longer
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

